services:
  tiger-bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: "여기에_봇_토큰"
      ADMIN_USER_IDS: "여기에_디스코드_관리자_ID(쉼표로_복수_지정)"
      LEETCODE_GRAPHQL_URL: "https://leetcode.com/graphql"
      LEETCODE_FETCH_TIMEOUT_MS: "5000"
      LEETCODE_TODAY_CACHE_PATH: "/app/data/leetcode-today.json"
      LEETCODE_TODAY_TIMEZONE: "Asia/Seoul"
      RPS_STATS_PATH: "/app/data/rps-stats.json"
    volumes:
      - ./data:/app/data
