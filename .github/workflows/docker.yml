name: Build and Push to GHCR

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase owner and repo
        run: |
          REPO_PATH="${GITHUB_REPOSITORY:-${{ github.repository }}}"
          OWNER_LC="${GITHUB_REPOSITORY_OWNER:-${{ github.repository_owner }}}"
          OWNER_LC="${OWNER_LC:-$(echo "$REPO_PATH" | cut -d'/' -f1)}"
          REPO_LC="${{ github.event.repository.name }}"
          if [ -z "${REPO_LC}" ] || [ "${REPO_LC}" = "null" ]; then
            REPO_LC="$(echo "$REPO_PATH" | cut -d'/' -f2)"
          fi
          OWNER_LC="${OWNER_LC:-mtgvim}"
          REPO_LC="${REPO_LC:-tiger-bot}"
          echo "OWNER_LC=${OWNER_LC,,}" >> "$GITHUB_ENV"
          echo "REPO_LC=${REPO_LC,,}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build commit summary
        shell: bash
        run: |
          set -euo pipefail
          LATEST="$(git log -1 --pretty=%s)"
          TOTAL="$(git rev-list --count "${{ github.event.before }}..${{ github.sha }}" 2>/dev/null || echo 1)"
          if [ "$TOTAL" -lt 1 ]; then
            TOTAL=1
          fi
          EXTRA=$((TOTAL - 1))
          SUFFIX=""
          if [ "$EXTRA" -gt 0 ]; then
            SUFFIX=" (외 ${EXTRA}건)"
          fi
          {
            echo "COMMIT_SUMMARY_LINE<<EOF"
            echo "${LATEST}${SUFFIX}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read previous latest digest
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:latest"
          PREV_DIGEST="$(docker buildx imagetools inspect "$IMAGE" 2>/dev/null | awk '/^Digest:/ {print $2; exit}' || true)"
          if [ -z "${PREV_DIGEST:-}" ]; then
            echo "No previous digest for ${IMAGE} (first push or not yet propagated)."
          fi
          echo "PREV_LATEST_DIGEST=${PREV_DIGEST:-}" >> "$GITHUB_ENV"

      - name: Build & Push
        id: build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:${{ github.sha }}

      - name: Compare digest change
        shell: bash
        env:
          NEW_DIGEST: ${{ steps.build_push.outputs.digest }}
        run: |
          set -euo pipefail
          PREV="${PREV_LATEST_DIGEST:-}"
          NEW="${NEW_DIGEST:-}"
          if [ -z "$NEW" ]; then
            echo "IMAGE_CHANGED=true" >> "$GITHUB_ENV"
            echo "Unable to read new digest; keep notifications enabled."
            exit 0
          fi
          if [ -z "$PREV" ] || [ "$PREV" != "$NEW" ]; then
            echo "IMAGE_CHANGED=true" >> "$GITHUB_ENV"
            echo "Digest changed: ${PREV:-<none>} -> $NEW"
          else
            echo "IMAGE_CHANGED=false" >> "$GITHUB_ENV"
            echo "Digest unchanged: $NEW"
          fi
          echo "NEW_IMAGE_DIGEST=$NEW" >> "$GITHUB_ENV"

      - name: Verify GHCR tag propagation (retry up to 30s)
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:${{ github.sha }}"
          for i in {1..6}; do
            if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
              echo "Verified: $IMAGE"
              exit 0
            fi
            echo "[$i/6] Not visible yet. Retrying in 5s..."
            sleep 5
          done
          echo "Failed to verify image visibility within 30 seconds: $IMAGE"
          exit 1

      - name: Notify Discord (success)
        if: ${{ success() }}
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ "${IMAGE_CHANGED:-true}" != "true" ]; then
            echo "Image digest unchanged. Skip success notification."
            exit 0
          fi
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skip success notification."
            exit 0
          fi
          IMAGE="ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:${{ github.sha }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}"
          MSG=$(cat <<EOF
          🚀 도커 이미지 배포 완료 · ${SHORT_SHA}
          📝 ${COMMIT_SUMMARY_LINE}
          🧩 이미지: ${IMAGE}
          🔗 [변경사항](${COMPARE_URL})
          EOF
          )
          curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$MSG" '{content:$content,flags:4}')"

      - name: Notify Discord (failure)
        if: ${{ failure() }}
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skip failure notification."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}"
          MSG=$(cat <<EOF
          ❌ 도커 이미지 배포 실패 · ${SHORT_SHA}
          📝 ${COMMIT_SUMMARY_LINE}
          🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          🔗 [변경사항](${COMPARE_URL})
          EOF
          )
          curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$MSG" '{content:$content,flags:4}')"
